security:
    # Password hashing strategy for application users.
    # "auto" lets Symfony choose a secure hasher depending on the environment.
    password_hashers:
        App\Entity\User:
            algorithm: auto

    # Users are loaded from the database by their email address.
    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        # Disable security for Symfony debug/profiler and static assets in dev.
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false

        # Public endpoint used only to exchange email/password for a JWT token.
        # This firewall must be declared before the generic API firewall.
        api_login:
            pattern: ^/api/login_check
            stateless: true
            provider: app_user_provider
            json_login:
                check_path: /api/login_check
                username_path: email
                password_path: password
                success_handler: lexik_jwt_authentication.handler.authentication_success
                failure_handler: lexik_jwt_authentication.handler.authentication_failure

        # Stateless API firewall.
        # Every protected API request must provide:
        # Authorization: Bearer <token>
        api:
            pattern: ^/api
            stateless: true
            provider: app_user_provider
            jwt: ~

        # Default firewall kept for future web pages, CLI compatibility,
        # or possible browser-based features.
        main:
            lazy: true
            provider: app_user_provider

    access_control:
        # Login must stay public, otherwise no token can be created.
        - { path: ^/api/login_check, roles: PUBLIC_ACCESS }

        # All other API routes require an authenticated user.
        - { path: ^/api, roles: ROLE_USER }